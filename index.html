<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All-in-One Video Downloader</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 90%; }
        h1 { color: #1877f2; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { background-color: #1877f2; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; }
        button:hover { background-color: #166fe5; }
        .footer { margin-top: 20px; font-size: 12px; color: #777; }
    </style>
</head>
<body>
    <div class="container">
        <script src="https://pl29169996.profitablecpmratenetwork.com/e6/d6/de/e6d6ded86da69998f9c907c96d76eabd.js"></script>

     <h1>Downloader</h1>
        <p>Paste video link (TikTok, Insta, FB, YT)</p>
        <input type="text" id="url" placeholder="https://...">
        <button onclick="startDownload()">Download Now</button>
        <div class="footer">Free & Unlimited Downloader</div>
    </div>

    <script>
        function startDownload() {
            const videoUrl = document.getElementById('url').value;
            if (!videoUrl) {
                alert("Pehle link toh paste karein!");
                return;
            }
            // Redirecting to Cobalt API for processing
            const serviceUrl = "https://cobalt.tools/api/json?url=" + encodeURIComponent(videoUrl);
            window.location.href = serviceUrl;
        }
    </script>
</body>
</html>
